version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: warehouse_mgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wm-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/warehouse_mgmt?schema=public
      JWT_ACCESS_SECRET: dev_access_secret
      JWT_REFRESH_SECRET: dev_refresh_secret
    ports:
      - '3001:3001'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    ports:
      - '3000:3000'

volumes:
  postgres_data:
